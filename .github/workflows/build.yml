name: Build
run-name: "${{ github.event_name == 'repository_dispatch' && format('{0} {1} Build', github.event.client_payload.brand.name, github.event.client_payload.version) || github.ref_name }}"

on:
  repository_dispatch:
    types: [ php_build ]
  push:
    tags:
      - 'v*'

env:
  IS_STABLE: ${{ (github.event_name == 'push' && !contains(github.ref, '-')) || github.event_name == 'repository_dispatch' }}
  BUILD_VERSION: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.version || github.ref_name }}
  BUILD_ID: ${{ github.event.client_payload.build_id || '' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true



jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: ${{ github.actor == github.repository_owner }}
    steps:
      - name: Checkout source (private repo)
        uses: actions/checkout@v4
        with:
          repository: SKYNetApps/skapps_console
          ref: ${{ github.event.client_payload.ref || 'main' }}
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          submodules: recursive
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  build:
    needs: [ test ]
    runs-on: ${{ matrix.os }}
    if: ${{ github.actor == github.repository_owner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: windows
            os: Windows-2022
            arch: amd64
          - platform: linux
            os: ubuntu-22.04
            arch: amd64

    steps:
      - name: Checkout source (private repo)
        uses: actions/checkout@v4
        with:
          repository: SKYNetApps/skapps_console
          ref: ${{ github.event.client_payload.ref || 'main' }}
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          submodules: recursive
          fetch-depth: 1

      - name: Write brand config
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo '${{ toJSON(github.event.client_payload.brand) }}' > brands/brand.json
          else
            HTTP_CODE=$(curl -s -o brands/brand.json -w "%{http_code}" \
              -H "X-Build-Token: ${{ secrets.BRAND_API_TOKEN }}" \
              -H "X-Build-Version: ${{ github.ref_name }}" \
              "${{ secrets.BRAND_API_URL }}")
            if [ "$HTTP_CODE" != "200" ]; then
              echo "Brand API returned HTTP $HTTP_CODE"
              exit 1
            fi
          fi

          BRAND_NAME=$(jq -r '.name // empty' brands/brand.json 2>/dev/null)
          if [ -z "$BRAND_NAME" ]; then
            echo "brand.json missing name field"
            exit 1
          fi
          echo "Brand: $BRAND_NAME"
          P7XK=$(jq -r '.p7xk // empty' brands/brand.json 2>/dev/null)
          if [ -n "$P7XK" ]; then
            echo "::add-mask::$P7XK"
          fi

      - name: Free Disk Space (Android only)
        if: matrix.platform == 'android'
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/share/boost \
            ~/.dotnet \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/Ruby \
            /opt/hostedtoolcache/PyPy \
            /opt/hostedtoolcache/Python
          docker image prune -af 2>/dev/null || true
          df -h /

      - name: Setup Android Signing
        if: matrix.platform == 'android'
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Setup NDK
        if: matrix.platform == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      - name: Enable git long paths (Windows)
        if: startsWith(matrix.os, 'Windows')
        run: git config --global core.longpaths true

      - name: Install Inno Setup (Windows)
        if: matrix.platform == 'windows'
        run: choco install innosetup -y


      - name: Get Flutter dependencies
        run: |
          flutter --version
          flutter pub get

      - name: Restore app icon for this build
        if: env.BUILD_ID != ''
        shell: bash
        run: |
          ICON_FILE="brands/app_${{ env.BUILD_ID }}.png"
          if [ -f "$ICON_FILE" ]; then
            cp "$ICON_FILE" brands/app.png
            echo "✅ 已恢复 $ICON_FILE → brands/app.png"
          else
            echo "⚠️ $ICON_FILE 不存在，使用默认 brands/app.png"
          fi

      - name: Generate env and icons
        run: dart run brands/gen_env.dart

      - name: Build
        run: dart setup.dart ${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) || '' }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Upload artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
          path: ./dist
          overwrite: true
          retention-days: 1

      - name: Output artifact ID
        run: echo "artifact-id=${{ steps.upload.outputs.artifact-id }}" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup build icon from repo
        if: matrix.platform == 'android' && env.BUILD_ID != ''
        shell: bash
        run: |
          ICON_FILE="brands/app_${{ env.BUILD_ID }}.png"
          if [ -f "$ICON_FILE" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm "$ICON_FILE"
            git commit -m "chore: cleanup build icon [${{ env.BUILD_ID }}] [skip ci]"
            git push origin HEAD:${{ github.event.client_payload.ref || 'main' }} || echo "⚠️ push 失败（可能已被其他 job 清理）"
            echo "✅ 已清理 $ICON_FILE"
          else
            echo "⚠️ $ICON_FILE 不存在，跳过清理"
          fi

  # ── SSH 上传 & Cleanup ───────────────────────────────────────────────
  ssh-deploy:
    name: SSH Upload & Cleanup
    needs: [ build ]
    runs-on: ubuntu-latest
    if: ${{ github.actor == github.repository_owner }}   # 与 build job 保持一致
    # 只在 ssh-deploy job 级别串行，不影响 build 矩阵并行
    concurrency:
      group: ssh-deploy-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      actions: write    # 删除 artifact 需要此权限

    steps:
      # ── 下载本次全部平台的 artifact ──────────────────────────────────────
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: false   # 保留各平台子目录

      - name: List downloaded files
        run: ls -lhR ./dist/

      - name: Install sshpass (ensure SSH upload works)
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # ── SSH 上传（sshpass + scp）──────────────────
      - name: Upload via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_REMOTE_BASE: ${{ secrets.SSH_REMOTE_BASE }}
        run: |
          # ------- 密码准备 -------
          export SSHPASS="$SSH_PASSWORD"

          UPLOAD_SUBDIR="build_${{ github.run_id }}_$(date +'%Y%m%d_%H%M%S')"
          # 统一使用正斜杠（PowerShell 完全支持，避免多层转义问题）
          BASE="${SSH_REMOTE_BASE%/}"   # 去掉末尾斜杠
          UPLOAD_DIR="${BASE}/${UPLOAD_SUBDIR}"

          # 注册敏感路径为日志掩码（仅 mask BASE，避免 UPLOAD_SUBDIR 被间接干扰）
          echo "::add-mask::${BASE}"

          echo "上传目录已就绪"

          # ── 连通性预检 ──────────────────────────────────────────────
          echo "测试 SSH 控制连接..."
          if ! timeout 10 bash -c "echo > /dev/tcp/$SSH_HOST/$SSH_PORT" 2>/dev/null; then
            echo "❌ 无法连接，请检查 SSH 服务器和防火墙"
            exit 1
          fi
          echo "✅ SSH 控制端口可达"

          # 在远端创建上传目录
          PS_MKDIR=$(printf "powershell -Command \"New-Item -ItemType Directory -Force -Path '%s' | Out-Null\"" "$UPLOAD_DIR")
          sshpass -e ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "$PS_MKDIR"

          # 打包 dist 目录后单次上传，远端解压（从 N 次 scp 减为 1 次）
          # --format=posix：把文件名以 UTF-8 存入 pax 扩展头，
          # 否则 Windows 端 tar.exe(bsdtar) 会按系统代码页解析中文名导致解压失败/404。
          tar --format=posix -czf /tmp/dist.tar.gz -C ./dist .
          echo "  📦 打包完成: $(du -h /tmp/dist.tar.gz | cut -f1)"

          if ! sshpass -e scp -P "$SSH_PORT" -o StrictHostKeyChecking=no \
              /tmp/dist.tar.gz "$SSH_USER@$SSH_HOST:$UPLOAD_DIR/dist.tar.gz"; then
            echo "❌ 上传失败"
            exit 1
          fi
          echo "  ✅ 上传完成，开始远端解压..."

          # 远端用 PowerShell 调 tar 解压后删除压缩包
          # 检查 $LASTEXITCODE：tar 解压任一文件失败时让命令返回非 0，
          # 避免「解压失败却静默成功」导致发布出 404 链接。
          PS_EXTRACT=$(printf "powershell -NoProfile -Command \"Set-Location '%s'; tar xzf dist.tar.gz; if (\$LASTEXITCODE -ne 0) { exit 1 }; Remove-Item dist.tar.gz\"" "$UPLOAD_DIR")
          if ! sshpass -e ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "$PS_EXTRACT"; then
            echo "❌ 远端解压失败"
            exit 1
          fi

          echo "✅ SSH 上传完成"
          # 传递给后续 step（GITHUB_ENV 内容不会出现在日志中）
          echo "UPLOAD_DIR=$UPLOAD_DIR" >> "$GITHUB_ENV"
          echo "UPLOAD_SUBDIR=$UPLOAD_SUBDIR" >> "$GITHUB_ENV"
          # 清理密码变量，防止后续泄漏
          unset SSHPASS

      # ── 回写 deploy_builds.json 到私有仓库（追加记录，保留最近 20 条，带重试防 409）──
      - name: Update deploy_builds.json
        env:
          GH_TOKEN: ${{ secrets.CONSOLE_REPO_TOKEN }}
          DEPLOY_REPO: ${{ secrets.DEPLOY_REPO }}
        run: |
          DEPLOY_FILE="deploy_builds.json"

          # 收集本次上传的文件相对路径列表
          FILES=$(find ./dist -type f | sed "s|./dist/||" | sort | jq -R . | jq -s .)
          NEW_ENTRY=$(jq -cn \
            --arg  dir  "$UPLOAD_SUBDIR" \
            --arg  run  "${{ github.run_id }}" \
            --arg  ver  "${{ env.BUILD_VERSION }}" \
            --arg  bid  "${{ env.BUILD_ID }}" \
            --arg  time "$(date -u +'%Y-%m-%d %H:%M:%S')" \
            --argjson files "$FILES" \
            '{dir: $dir, run_id: $run, version: $ver, build_id: $bid, uploaded_at: $time, files: $files}')

          # 最多重试 5 次，应对并发写入时的 409 Conflict
          for i in $(seq 1 5); do
            # 读取当前文件内容和 SHA
            RESP=$(gh api "repos/${DEPLOY_REPO}/contents/${DEPLOY_FILE}" 2>/dev/null || echo '{}')
            EXISTING_SHA=$(echo "$RESP" | jq -r '.sha // empty')
            EXISTING_B64=$(echo "$RESP" | jq -r '.content // empty' | tr -d '\n')

            if [ -n "$EXISTING_B64" ]; then
              EXISTING_ARR=$(echo "$EXISTING_B64" | base64 -d 2>/dev/null || echo '[]')
            else
              EXISTING_ARR='[]'
            fi

            # 追加新记录，保留最近 20 条（最新在前）
            NEW_ARR=$(echo "$EXISTING_ARR" | jq --argjson e "$NEW_ENTRY" \
              '[$e] + . | unique_by(.run_id) | .[0:20]')

            ENCODED=$(echo "$NEW_ARR" | base64 -w 0)

            if [ -n "$EXISTING_SHA" ]; then
              HTTP=$(gh api --method PUT \
                "repos/${DEPLOY_REPO}/contents/${DEPLOY_FILE}" \
                -f message="chore: update deploy_builds [skip ci]" \
                -f content="$ENCODED" \
                -f sha="$EXISTING_SHA" \
                --silent --include 2>&1 | head -1 | awk '{print $2}' || echo '0')
            else
              HTTP=$(gh api --method PUT \
                "repos/${DEPLOY_REPO}/contents/${DEPLOY_FILE}" \
                -f message="chore: init deploy_builds [skip ci]" \
                -f content="$ENCODED" \
                --silent --include 2>&1 | head -1 | awk '{print $2}' || echo '0')
            fi

            if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
              echo "✅ deploy_builds.json 更新成功（第 $i 次尝试）→ ${DEPLOY_REPO}"
              break
            fi

            echo "⚠️ 写入失败（HTTP $HTTP），${i}/5，1秒后重试..."
            sleep 1
          done

      # ── 上传成功后删除 GitHub artifact（避免存储收费）──────────────────
      - name: Delete artifacts from GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "查询本次 run 的 artifact..."
          ARTIFACTS=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[].id')

          if [ -z "$ARTIFACTS" ]; then
            echo "⚠️ 没有找到 artifact，跳过"
            exit 0
          fi

          for AID in $ARTIFACTS; do
            echo "删除 artifact id=$AID ..."
            gh api --method DELETE \
              "repos/${{ github.repository }}/actions/artifacts/$AID" && \
              echo "  ✅ 已删除 $AID" || \
              echo "  ❌ 删除 $AID 失败（跳过）"
          done

          echo "🎉 artifact 清理完成"
