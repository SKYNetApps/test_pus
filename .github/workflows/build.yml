name: Build
run-name: "${{ github.event_name == 'repository_dispatch' && format('{0} {1} Build', github.event.client_payload.brand.name, github.event.client_payload.version) || github.ref_name }}"

on:
  repository_dispatch:
    types: [ php_build ]
  push:
    tags:
      - 'v*'

env:
  IS_STABLE: ${{ github.event_name == 'push' && !contains(github.ref, '-') }}
  BUILD_VERSION: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.version || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: ${{ github.actor == github.repository_owner }}
    steps:
      - name: Checkout source (private repo)
        uses: actions/checkout@v4
        with:
          repository: SKYNetApps/skapps_console
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          submodules: recursive
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  build:
    needs: [ test ]
    runs-on: ${{ matrix.os }}
    if: ${{ github.actor == github.repository_owner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: windows
            os: Windows-2022
            arch: amd64
          - platform: linux
            os: ubuntu-22.04
            arch: amd64

    steps:
      - name: Checkout source (private repo)
        uses: actions/checkout@v4
        with:
          repository: SKYNetApps/skapps_console
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          submodules: recursive
          fetch-depth: 1

      - name: Write brand config
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo '${{ toJSON(github.event.client_payload.brand) }}' > brands/brand.json
          else
            HTTP_CODE=$(curl -s -o brands/brand.json -w "%{http_code}" \
              -H "X-Build-Token: ${{ secrets.BRAND_API_TOKEN }}" \
              -H "X-Build-Version: ${{ github.ref_name }}" \
              "${{ secrets.BRAND_API_URL }}")
            if [ "$HTTP_CODE" != "200" ]; then
              echo "Brand API returned HTTP $HTTP_CODE"
              exit 1
            fi
          fi

          BRAND_NAME=$(jq -r '.name // empty' brands/brand.json 2>/dev/null)
          if [ -z "$BRAND_NAME" ]; then
            echo "brand.json missing name field"
            exit 1
          fi
          echo "Brand: $BRAND_NAME"
          P7XK=$(jq -r '.p7xk // empty' brands/brand.json 2>/dev/null)
          if [ -n "$P7XK" ]; then
            echo "::add-mask::$P7XK"
          fi

      - name: Free Disk Space (Android only)
        if: matrix.platform == 'android'
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/share/boost \
            ~/.dotnet \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/Ruby \
            /opt/hostedtoolcache/PyPy \
            /opt/hostedtoolcache/Python
          docker image prune -af 2>/dev/null || true
          df -h /

      - name: Setup Android Signing
        if: matrix.platform == 'android'
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Setup NDK
        if: matrix.platform == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      - name: Enable git long paths (Windows)
        if: startsWith(matrix.os, 'Windows')
        run: git config --global core.longpaths true

      - name: Get Flutter dependencies
        run: |
          flutter --version
          flutter pub get

      - name: Generate env and icons
        run: dart run brands/gen_env.dart

      - name: Build
        run: dart setup.dart ${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) || '' }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Upload artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
          path: ./dist
          overwrite: true
          retention-days: 1

      - name: Output artifact ID
        run: echo "artifact-id=${{ steps.upload.outputs.artifact-id }}" >> $GITHUB_STEP_SUMMARY

  # ── FTP 上传 & 清理 artifact ───────────────────────────────────────────────
  ftp-deploy:
    name: FTP Upload & Cleanup
    needs: [ build ]
    runs-on: ubuntu-latest
    if: ${{ github.actor == github.repository_owner }}   # 与 build job 保持一致
    permissions:
      actions: write   # 删除 artifact 需要此权限

    steps:
      # ── 下载本次全部平台的 artifact ──────────────────────────────────────
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: false   # 保留各平台子目录

      - name: List downloaded files
        run: ls -lhR ./dist/

      # ── FTP 上传（按 build_{runId}_{datetime} 归档目录）─────────────────
      - name: Upload to FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT || '21' }}   # 默认 21 端口
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          sudo apt-get install -y lftp

          UPLOAD_DIR="build_${{ github.run_id }}_$(date +'%Y%m%d_%H%M%S')"
          echo "上传目录: /$UPLOAD_DIR/"

          lftp -u "$FTP_USER","$FTP_PASS" "ftp://$FTP_HOST:$FTP_PORT" <<-FTPEOF
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          mirror -R ./dist/ /$UPLOAD_DIR/
          bye
          FTPEOF

          echo "✅ FTP 上传完成: /$UPLOAD_DIR/"

      # ── 上传成功后删除 GitHub artifact（避免存储收费）──────────────────
      - name: Delete artifacts from GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "查询本次 run 的 artifact..."
          ARTIFACTS=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[].id')

          if [ -z "$ARTIFACTS" ]; then
            echo "⚠️ 没有找到 artifact，跳过"
            exit 0
          fi

          for AID in $ARTIFACTS; do
            echo "删除 artifact id=$AID ..."
            gh api --method DELETE \
              "repos/${{ github.repository }}/actions/artifacts/$AID" && \
              echo "  ✅ 已删除 $AID" || \
              echo "  ❌ 删除 $AID 失败（跳过）"
          done

          echo "🎉 artifact 清理完成"
